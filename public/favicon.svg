<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Geo Pixel Board mark: a tiny pixel canvas. Clay chip (cream + ink tile) so
       it reads on light or dark tabs; pixels use the production art palette so the
       favicon is the same mark as the in-app logo. -->
  <rect width="32" height="32" rx="8" fill="#FFF7E8"/>
  <rect x="3" y="3" width="26" height="26" rx="7" fill="#171717"/>
  <rect x="7"  y="7"  width="6" height="6" rx="1" fill="#ED1C24"/>
  <rect x="19" y="7"  width="6" height="6" rx="1" fill="#FFF200"/>
  <rect x="13" y="13" width="6" height="6" rx="1" fill="#B83DBA"/>
  <rect x="7"  y="19" width="6" height="6" rx="1" fill="#22B14C"/>
  <rect x="19" y="19" width="6" height="6" rx="1" fill="#00A2E8"/>
</svg>
