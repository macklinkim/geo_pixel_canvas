name = "geo-pixel-board"
main = "worker/src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# Static SPA assets are served by the Worker via the ASSETS binding.
# The Cloudflare Vite plugin wires the build output directory automatically.
[assets]
binding = "ASSETS"
not_found_handling = "single-page-application"
# API and WebSocket routes hit the Worker first; everything else is served as
# a static asset (SPA fallback to index.html).
run_worker_first = ["/api/*", "/ws/*", "/app"]

# Global room index (lightweight pin metadata only — no pixel data here).
[[d1_databases]]
binding = "DB"
database_name = "geo_pixel_board"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "worker/migrations"

# One Durable Object instance per geohash room.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDurableObject"

# SQLite-backed DO storage (required for per-room pixel SQLite; free-tier compatible).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDurableObject"]

[vars]
MAP_STYLE_URL = ""
APP_VERSION = "0.1.0"
# Reverse-geocoder for auto-naming new rooms by their area (cell center only).
# Empty disables naming. Nominatim policy: 1 req/s, descriptive User-Agent;
# for production prefer a self-hosted or paid geocoder.
GEOCODE_URL = "https://nominatim.openstreetmap.org"

# Cloudflare Turnstile — human verification for write actions only.
# Site key is public. The SECRET key is NOT here: set it in .dev.vars (local)
# or `wrangler secret put TURNSTILE_SECRET_KEY` (production).
# Test site key (always passes): 1x00000000000000000000AA
TURNSTILE_ENABLED = "true"
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"
TURNSTILE_SESSION_TTL_MS = "1800000"
